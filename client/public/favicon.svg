<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3bc16b"/>
      <stop offset="100%" stop-color="#1f7a3d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Flag pole -->
  <rect x="168" y="80" width="12" height="360" rx="6" fill="#fff" opacity="0.95"/>
  <!-- Flag -->
  <path d="M180 80 L340 130 L180 180 Z" fill="#ffcf5c"/>
  <!-- Golf hole (dark circle) -->
  <ellipse cx="256" cy="432" rx="80" ry="20" fill="#062012" opacity="0.5"/>
  <!-- Ground line -->
  <ellipse cx="256" cy="440" rx="140" ry="14" fill="#062012" opacity="0.25"/>
</svg>
